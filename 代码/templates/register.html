{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<section class="auth-panel">
  <h1>注册</h1>
  <form method="post" class="auth-form">
    <label>用户名<input name="username" autocomplete="username"></label>
    <label>邮箱<input name="email" type="email" autocomplete="email"></label>
    <label>密码<input name="password" type="password" autocomplete="new-password"></label>
    <label>角色
      <select name="role">
        {% for role in roles %}
          <option value="{{ role }}">{{ role }}</option>
        {% endfor %}
      </select>
    </label>
    <fieldset>
      <legend>兴趣</legend>
      <div class="check-grid">
        {% for item in interests %}
          <label><input type="checkbox" name="interests" value="{{ item }}"> {{ item }}</label>
        {% endfor %}
      </div>
    </fieldset>
    <button type="submit">注册</button>
  </form>
</section>
{% endblock %}
